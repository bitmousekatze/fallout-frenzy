name: Fly Deploy

on:
  push:
    branches: [main]
    paths:
      - server.js
      - Dockerfile
      - fly.toml
      - package.json
      - package-lock.json

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
